<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's The Issue?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono:ital,wght@0,100..700;1,100..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f3ef;
      --surface:  #ffffff;
      --border:   #e2ddd8;
      --border2:  #cdc8c0;
      --text:     #1e1c1a;
      --muted:    #8c8580;
      --accent:   #1a6644;
      --accent2:  #1a6644;
      --red:      #c0392b;
      --yellow:   #a06010;
      --blue:     #1a4a8a;
      --mono:     'Berkeley Mono', 'Fira Code', 'Courier New', monospace;
      --serif:    'Instrument Serif', Georgia, serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
    }



    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ─── Header ─── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .logo {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.5px;
      font-style: italic;
    }

    .tagline {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    /* ─── Main ─── */
    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 14px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(74,240,160,0.08);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--accent2);
      border-radius: 4px;
      background: transparent;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: rgba(74,240,160,0.07);
      box-shadow: 0 0 12px rgba(74,240,160,0.12);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn.running {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* Spinner */
    .spin {
      width: 12px;
      height: 12px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .running .spin { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Job history */
    .job-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .job-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
      overflow: hidden;
    }

    .job-item:hover    { border-color: var(--border2); background: #161a1d; }
    .job-item.active   { border-color: var(--accent2); }

    .job-item-url {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .job-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .badge-pending  { background: #fef3cd; color: var(--yellow); }
    .badge-running  { background: #d4edda; color: var(--accent);  animation: pulse 1.5s infinite; }
    .badge-complete { background: #d4edda; color: #1a6644; }
    .badge-failed   { background: #f8d7da; color: var(--red);     }

    .job-item-time {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
    }

    /* ─── Output pane ─── */
    .output-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .output-toolbar {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .output-title {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .output-title span { color: var(--text); }

    .copy-btn {
      padding: 5px 12px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--border2); }
    .copy-btn.copied { color: var(--accent); border-color: var(--accent2); }

    .output-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .output-content::-webkit-scrollbar { width: 6px; }
    .output-content::-webkit-scrollbar-track { background: transparent; }
    .output-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }

    .empty-icon {
      font-size: 36px;
      opacity: 0.3;
      font-family: var(--serif);
      font-style: italic;
      color: var(--accent);
    }

    .empty-state p { font-size: 12px; }

    /* Result blocks */
    .result-wrapper {
      max-width: 820px;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .result-repo {
      font-size: 14px;
      color: var(--blue);
    }

    .result-thread {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    .message-block {
      margin-bottom: 18px;
    }

    .message-role {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-role::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .message-role.ai-role::before { background: var(--accent); }
    .message-role.tool-role::before { background: var(--yellow); }
    .message-role.human-role::before { background: var(--blue); }

    .message-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
      line-height: 1.75;
      font-size: 13px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-body.ai-body {
      border-left: 2px solid var(--accent2);
    }

    /* Markdown-ish rendering inside message body */
    .message-body h1, .message-body h2, .message-body h3 {
      font-family: var(--serif);
      font-style: italic;
      color: var(--accent);
      margin: 14px 0 6px;
    }

    .message-body h1 { font-size: 20px; }
    .message-body h2 { font-size: 16px; }
    .message-body h3 { font-size: 14px; color: var(--text); }

    .message-body p { margin: 8px 0; }
    .message-body ul, .message-body ol { margin: 8px 0 8px 20px; }
    .message-body li { margin: 4px 0; }

    .message-body code {
      background: #f0ede8;
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 1px 5px;
      font-size: 12px;
      color: var(--yellow);
    }

    .message-body strong { color: #e0e8f0; }
    .message-body em { color: #90a8c0; font-style: italic; }

    /* Loading dots inside output pane */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .loading-bar {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: var(--border);
      overflow: hidden;
      border-radius: 1px;
    }

    .loading-bar-inner {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 1px;
      animation: slide 1.4s ease-in-out infinite;
      box-shadow: 0 0 8px var(--accent);
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .loading-text {
      font-size: 12px;
      color: var(--muted);
    }

    .loading-thread {
      font-size: 10px;
      color: var(--muted);
      opacity: 0.6;
    }

    .error-block {
      background: #fdf0f0;
      border: 1px solid #e8c0c0;
      border-left: 2px solid var(--red);
      border-radius: 4px;
      padding: 16px 18px;
      color: var(--red);
      font-size: 12px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="logo">What's The Issue?</div>
    <div class="tagline">// github issue triage</div>
    <div class="header-right">
      <div class="status-dot" id="apiDot"></div>
      <div class="status-label" id="apiStatus">api ready</div>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside class="sidebar">

      <div>
        <div class="section-label">▸ Submit</div>

        <label for="tokenInput">GitHub Token</label>
        <input
          type="password"
          id="tokenInput"
          placeholder="ghp_xxxxxxxxxxxx"
          autocomplete="off"
        />

        <label for="urlInput">Repository URL</label>
        <input
          type="text"
          id="urlInput"
          placeholder="https://github.com/owner/repo"
          autocomplete="off"
        />

        <button class="btn" id="submitBtn" onclick="submitAnalysis()">
          <div class="spin"></div>
          <span id="submitLabel">Analyze Issues</span>
        </button>
      </div>

      <div class="divider"></div>

      <div style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <div class="section-label">▸ History</div>
        <div class="job-list" id="jobList">
          <div style="color: var(--muted); font-size: 11px;">No jobs yet.</div>
        </div>
      </div>

    </aside>

    <!-- Output -->
    <div class="output-pane">
      <div class="output-toolbar">
        <div class="output-title" id="outputTitle">
          Select a job or submit a new one
        </div>
        <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none">
          Copy
        </button>
      </div>
      <div class="output-content" id="outputContent">
        <div class="empty-state">
          <div class="empty-icon">?</div>
          <p>Paste a GitHub repo URL and your token,<br/>then hit Analyze.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const API_BASE = '/api';  // proxied by nginx

  // ─── State ───────────────────────────────────────────────────────────────
  let jobs = JSON.parse(localStorage.getItem('wti_jobs') || '[]');
  // jobs: [{ thread_id, url, status, result, error, ts }]

  let activeThreadId = null;
  let pollTimers = {};

  // ─── Init ─────────────────────────────────────────────────────────────────
  function init() {
    renderJobList();
    // Resume polling for pending/running jobs
    jobs.forEach(job => {
      if (job.status === 'pending' || job.status === 'running') {
        startPolling(job.thread_id);
      }
    });
    if (jobs.length > 0) {
      selectJob(jobs[0].thread_id);
    }
  }

  // ─── Submit ───────────────────────────────────────────────────────────────
  async function submitAnalysis() {
    const token = document.getElementById('tokenInput').value.trim();
    const url   = document.getElementById('urlInput').value.trim();

    if (!token) { flashInput('tokenInput'); return; }
    if (!url)   { flashInput('urlInput');   return; }

    setSubmitState(true);

    try {
      const res = await fetch(`${API_BASE}/analyze`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-GitHub-Token': token,
        },
        body: JSON.stringify({ github_url: url }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const job = {
        thread_id: data.thread_id,
        url,
        status: data.status,
        result: null,
        error: null,
        ts: Date.now(),
      };

      jobs.unshift(job);
      saveJobs();
      renderJobList();
      selectJob(job.thread_id);
      startPolling(job.thread_id);

      document.getElementById('urlInput').value = '';
    } catch (e) {
      showError(`Submit failed: ${e.message}`);
    } finally {
      setSubmitState(false);
    }
  }

  // ─── Polling ──────────────────────────────────────────────────────────────
  function startPolling(threadId) {
    if (pollTimers[threadId]) return;

    async function poll() {
      try {
        const res = await fetch(`${API_BASE}/analyze/${threadId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        updateJob(threadId, data.status, data.result, data.error);

        if (data.status === 'complete' || data.status === 'failed') {
          clearInterval(pollTimers[threadId]);
          delete pollTimers[threadId];
        }
      } catch (e) {
        console.warn('Poll error:', e);
      }
    }

    poll(); // immediate first call
    pollTimers[threadId] = setInterval(poll, 2500);
  }

  function updateJob(threadId, status, result, error) {
    const job = jobs.find(j => j.thread_id === threadId);
    if (!job) return;

    job.status = status;
    job.result = result;
    job.error  = error;
    saveJobs();
    renderJobList();

    if (activeThreadId === threadId) {
      renderOutput(job);
    }
  }

  // ─── Job selection ────────────────────────────────────────────────────────
  function selectJob(threadId) {
    activeThreadId = threadId;
    const job = jobs.find(j => j.thread_id === threadId);
    if (job) renderOutput(job);

    // Highlight active in list
    document.querySelectorAll('.job-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === threadId);
    });
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function renderJobList() {
    const list = document.getElementById('jobList');
    if (jobs.length === 0) {
      list.innerHTML = '<div style="color: var(--muted); font-size: 11px;">No jobs yet.</div>';
      return;
    }

    list.innerHTML = jobs.map(job => `
      <div class="job-item ${job.thread_id === activeThreadId ? 'active' : ''}"
           data-id="${job.thread_id}"
           onclick="selectJob('${job.thread_id}')">
        <div class="job-item-url">${repoName(job.url)}</div>
        <div class="job-item-meta">
          <span class="badge badge-${job.status}">${job.status}</span>
          <span class="job-item-time">${timeAgo(job.ts)}</span>
        </div>
      </div>
    `).join('');
  }

  function renderOutput(job) {
    const titleEl   = document.getElementById('outputTitle');
    const contentEl = document.getElementById('outputContent');
    const copyBtn   = document.getElementById('copyBtn');

    titleEl.innerHTML = `<span>${repoName(job.url)}</span> &nbsp;·&nbsp; ${job.thread_id.slice(0,8)}`;

    if (job.status === 'pending' || job.status === 'running') {
      copyBtn.style.display = 'none';
      contentEl.innerHTML = `
        <div class="loading-state">
          <div style="font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase;">
            ${job.status === 'pending' ? 'Queued' : 'Analyzing issues'}
          </div>
          <div class="loading-bar"><div class="loading-bar-inner"></div></div>
          <div class="loading-thread">thread: ${job.thread_id}</div>
        </div>
      `;
      return;
    }

    if (job.status === 'failed') {
      copyBtn.style.display = 'none';
      contentEl.innerHTML = `
        <div class="error-block">
          <div style="margin-bottom:6px; font-size:10px; letter-spacing:.1em; text-transform:uppercase;">Error</div>
          ${escapeHtml(job.error || 'Unknown error')}
        </div>
      `;
      return;
    }

    // complete
    copyBtn.style.display = '';
    const messages = job.result?.messages || [];
    contentEl.innerHTML = `
      <div class="result-wrapper">
        <div class="result-meta">
          <span class="result-repo">${escapeHtml(repoName(job.url))}</span>
          <span class="result-thread">thread ${job.thread_id}</span>
        </div>
        ${messages.map(msg => renderMessage(msg)).join('')}
      </div>
    `;
  }

  function renderMessage(msg) {
    const type = msg.type || 'ai';
    const content = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content, null, 2);

    const roleLabel = type === 'ai' ? 'assistant' : type === 'tool' ? 'tool' : 'human';
    const roleClass = type === 'ai' ? 'ai-role' : type === 'tool' ? 'tool-role' : 'human-role';
    const bodyClass = type === 'ai' ? 'ai-body' : '';

    return `
      <div class="message-block">
        <div class="message-role ${roleClass}">${roleLabel}</div>
        <div class="message-body ${bodyClass}">${renderMarkdown(content)}</div>
      </div>
    `;
  }

  // Minimal markdown renderer
  function renderMarkdown(text) {
    const escaped = escapeHtml(text);
    return escaped
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br/>');
  }

  // ─── Copy ─────────────────────────────────────────────────────────────────
  function copyResult() {
    const job = jobs.find(j => j.thread_id === activeThreadId);
    if (!job?.result) return;

    const text = (job.result.messages || [])
      .map(m => `[${m.type}]\n${typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2)}`)
      .join('\n\n---\n\n');

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function saveJobs() {
    // Keep last 50 completed, trim results for storage
    const toStore = jobs.slice(0, 50).map(j => ({
      ...j,
      // Don't persist huge results to localStorage if too big
    }));
    try { localStorage.setItem('wti_jobs', JSON.stringify(toStore)); } catch(e) {}
  }

  function setSubmitState(loading) {
    const btn = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    btn.disabled = loading;
    btn.classList.toggle('running', loading);
    label.textContent = loading ? 'Submitting…' : 'Analyze Issues';
  }

  function showError(msg) {
    const contentEl = document.getElementById('outputContent');
    contentEl.innerHTML = `<div class="error-block">${escapeHtml(msg)}</div>`;
  }

  function flashInput(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--red)';
    el.focus();
    setTimeout(() => { el.style.borderColor = ''; }, 1200);
  }

  function repoName(url) {
    try {
      const u = new URL(url);
      return u.pathname.replace(/^\//, '').replace(/\/$/, '');
    } catch { return url; }
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const s = Math.floor(diff / 1000);
    if (s < 60)   return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');

  setInterval(renderJobList, 60000);
